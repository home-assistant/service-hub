name: Release

on:
  release:
    types:
      - published

concurrency:
  group: "${{ github.workflow }}"
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy-container:
    name: Deploy container
    runs-on: ubuntu-latest
    # Terraform Cloud secrets only exist on the deploy repo; skip that step
    # cleanly on forks so a test release doesn't fail there.
    env:
      TFC_TOKEN: ${{ secrets.TERRAFORM_CLOUD_TOKEN }}
      TFC_VARSET_ID: ${{ secrets.TERRAFORM_CLOUD_VARSET_ID }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Populate version.json
        # Bake the released version and commit hash into the image so the
        # running bot can report exactly what it is.
        run: |
          hash=$(git rev-parse HEAD)
          echo "{\"version\": {\"hash\": \"$hash\", \"version\": \"${{ github.ref_name }}\"}}" > ./version.json

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the container image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: "ghcr.io/${{ github.repository_owner }}/service-hub:${{ github.ref_name }}"

      - name: Update the Terraform variable set
        if: env.TFC_TOKEN != '' && env.TFC_VARSET_ID != ''
        run: |
          variable_id=$(curl -sSL \
            --header "Authorization: Bearer ${TFC_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            --request GET \
            "https://app.terraform.io/api/v2/varsets/${TFC_VARSET_ID}" \
            | jq -r '.data.relationships.vars.data[0] | .id')

          curl -sSL \
            --header "Authorization: Bearer ${TFC_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            --request PATCH \
            --data "{\"data\": {\"type\": \"vars\", \"attributes\": {\"value\": \"${{ github.ref_name }}\"}}}" \
            "https://app.terraform.io/api/v2/varsets/${TFC_VARSET_ID}/relationships/vars/${variable_id}"
