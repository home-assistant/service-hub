name: Sync PR templates

# Keep fixture bodies coupled to the upstream PR templates: vendor the live
# template, re-render the fixture bodies from it, refresh the expected-effect
# files, and open a PR when anything changed — its diff shows the template
# change, the regenerated bodies, and the effect fallout in one place. A
# removed or reworded checkbox that a fixture ticks fails the render step,
# turning the scheduled run red instead of silently drifting.

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up pnpm
        # Installs the pnpm version pinned in package.json's packageManager.
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Vendor the upstream PR templates
        run: pnpm run sync-templates

      - name: Detect template changes
        id: template
        # Stop early when the vendored template is unchanged — later steps
        # refresh expected effects, and running them anyway would fold unrelated
        # drift into a "template sync" PR.
        run: echo "changed=$(git diff --quiet && echo false || echo true)" >> "$GITHUB_OUTPUT"

      - name: Re-render fixture bodies
        if: steps.template.outputs.changed == 'true'
        run: pnpm run update-fixture-bodies

      - name: Refresh expected effects
        if: steps.template.outputs.changed == 'true'
        run: UPDATE_FIXTURES=1 pnpm test

      - name: Open a pull request
        if: steps.template.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: bot/sync-pr-templates
          delete-branch: true
          commit-message: Sync fixture bodies with the upstream PR template
          title: Sync fixture bodies with the upstream PR template
          body: >-
            The upstream PR template changed. This PR vendors the new template,
            re-renders the fixture bodies from it, and refreshes the expected
            effects — review that diff for behavioral fallout (e.g. a
            type-of-change label disappearing means a rule no longer matches
            the reworded checkbox).
