- call: issues.createComment
  params:
    issue_number: 21
    owner: contributor
    repo: core
    body: |-
      <!-- ha-bot:code-owner-mention -->

      Hey there @balloob, mind taking a look at this pull request as it has been labeled with an integration (`hue`) you are listed as a [code owner](https://github.com/home-assistant/core/blob/HEAD/CODEOWNERS#L1) for? Thanks!
      <details><summary>Code owner commands</summary>

      Reply with `/ha-bot <command>`:

      - `update` — Re-runs the bot's checks on the issue or pull request.
      - `unassign` — Removes the given integration domain's label and its code owners from the assignees. — e.g. `/ha-bot unassign "opensky"`
      - `ignore` — Waives a dashboard check: `ignore "<check name>" "<reason>"`. *(author)* — e.g. `/ha-bot ignore "Merge conflicts" "Broken rule, no merge conflicts present"`
      - `unignore` — Restores a waived dashboard check: `unignore "<check name>"`. *(author)* — e.g. `/ha-bot unignore "Merge conflicts"`
      - `close` — Closes the issue or pull request. *(code owners)*
      - `reopen` — Reopens the issue or pull request. *(code owners)*
      - `rename` — Renames the issue or pull request: `rename "<new title>"`. *(code owners)* — e.g. `/ha-bot rename "A more descriptive title"`
      - `add-label` — Adds a label (needs-more-information, problem in dependency, problem in custom component, problem in config, problem in device, feature-request) to the issue or pull request. *(code owners)* — e.g. `/ha-bot add-label "needs-more-information"`
      - `remove-label` — Removes a label (needs-more-information, problem in dependency, problem in custom component, problem in config, problem in device, feature-request) from the issue or pull request. *(code owners)* — e.g. `/ha-bot remove-label "needs-more-information"`
      - `mark-draft` — Marks the pull request as draft. *(code owners)*
      - `ready-for-review` — Removes the draft status from the pull request. *(code owners)*
      - `update-branch` — Updates the pull request branch with the base branch. *(code owners)*

      </details>
